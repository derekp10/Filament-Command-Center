<!-- modals_weigh_out.html -->
<div class="modal fade" id="weighOutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark border border-success border-2 shadow-lg">
            <div class="modal-header border-bottom border-success border-opacity-50 text-white">
                <h5 class="modal-title d-flex align-items-center gap-2">
                    ⚖️ Bulk Weigh-Out
                </h5>
                <span class="badge bg-secondary ms-3" id="weigh-out-count">0 Spools Ready</span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-white" style="background-color: #1a1e23; max-height: 70vh; overflow-y: auto;">
                <!-- Phase 2 (Group 12): modal-level mode selector. The same value
                     applies to every row — most users batch-weigh the same way.
                     Default is Net to preserve historical behavior (input is the
                     spool's remaining filament weight). Switching to Gross gives
                     L38 (auto-subtract spool tare). -->
                <div class="d-flex align-items-center gap-2 mb-3 pb-2 border-bottom border-secondary">
                    <span class="text-white-50 small">Mode</span>
                    <div class="btn-group btn-group-sm" role="group" id="weigh-out-mode">
                        <button type="button" class="btn btn-outline-info" data-mode="gross">Gross</button>
                        <button type="button" class="btn btn-info" data-mode="net">Net</button>
                        <button type="button" class="btn btn-outline-info" data-mode="additive">Additive</button>
                        <button type="button" class="btn btn-outline-info" data-mode="set_used">Set Used</button>
                    </div>
                    <span class="text-white-50 small ms-2" id="weigh-out-mode-hint">used = initial − net</span>
                </div>

                <div id="weigh-out-empty" class="text-center text-white-50 p-4">
                    <h5>No Spools in Buffer</h5>
                    <p>Scan some spools into the buffer first, or scan them now while this window is open!</p>
                </div>

                <div id="weigh-out-list" class="d-flex flex-column gap-3">
                    <!-- Spool rows will be injected here -->
                </div>
            </div>
            <div class="modal-footer border-top border-success border-opacity-50 d-flex justify-content-between flex-wrap">
                <div class="text-white-50 small">Scan new items to add to this list. Type weight and press Enter to save.</div>
                <div class="d-flex align-items-center gap-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="weigh-auto-archive" checked>
                        <label class="form-check-label text-warning small" for="weigh-auto-archive">Auto-Archive 0g</label>
                    </div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Quick-Weigh now renders as an inline overlay via window.WeightEntry.openModal()
     (modules/weight_entry.js). The legacy #quickWeighModal Bootstrap markup
     was retired in Phase 2 (Group 12). -->
