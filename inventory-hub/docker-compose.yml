services:
  inventory-hub:
    container_name: inventory_hub
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    volumes:
      # 1. App Code
      - ./:/app
      
      # 2. Config File (Parent Dir)
      - ../config.json:/config.json
      
      # 3. THE MAGIC VARIABLE 🎩
      # This tells Docker: "Look in the .env file to find out where this folder is."
      - "${LABEL_OUTPUT_PATH}:/output"

    environment:
      - PYTHONUNBUFFERED=1
      # Dev-only: activates the app.py L293 block — Werkzeug reloader (.py edits)
      # + Jinja TEMPLATES_AUTO_RELOAD (.html edits) so changes hot-reload without
      # a container restart. Prod on TrueNAS does not use this compose file.
      - FCC_DEV=1