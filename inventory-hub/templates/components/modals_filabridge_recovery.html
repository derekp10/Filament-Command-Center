<div class="modal fade" id="fbRecoveryModal" tabindex="-1" aria-hidden="true" data-bs-backdrop="static">
    <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content bg-dark text-light border border-warning shadow-lg">
            <div class="modal-header border-warning bg-warning bg-opacity-10 text-warning">
                <h5 class="modal-title fw-bold">💊 FilaBridge Error Recovery</h5>
                <button type="btn" class="btn-close btn-close-white" onclick="closeModal('fbRecoveryModal')" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-danger shadow-sm border border-danger">
                    <strong>Printer:</strong> <span id="fb-rec-printer"></span><br>
                    <strong>File:</strong> <span id="fb-rec-file"></span>
                </div>
                
                <h6 class="fw-bold mb-3">🛠️ Connected Spools</h6>
                <div id="fb-rec-spools-container" class="mb-3">
                    <div class="text-center text-light">Loading spools...</div>
                </div>

                <div class="d-flex justify-content-between align-items-end mt-4 pt-3 border-top border-secondary">
                    <div class="d-flex flex-column gap-2">
                        <button id="btn-fb-auto-parse" class="btn btn-warning shadow-lg fw-bold" onclick="window.triggerAggressiveGcodeParse()">
                            ⚡ Auto-Parse GCode
                        </button>
                        <div>
                            <input type="file" id="fb-manual-upload" accept=".gcode,.bgcode" style="display:none;" onchange="window.handleManualGcodeUpload(event)">
                            <button class="btn btn-sm btn-outline-info" onclick="document.getElementById('fb-manual-upload').click()">
                                📁 Browse Local GCode...
                            </button>
                        </div>
                    </div>
                    <div>
                        <button class="btn btn-secondary me-2" onclick="closeModal('fbRecoveryModal')">Cancel</button>
                        <button class="btn btn-primary fw-bold" onclick="window.submitManualFilaBridgeRecovery()">Save Manual Adjustments</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
window._currentFbError = null;

// Opens the modal when the Fix button is clicked on a log line
window.openFilaBridgeRecovery = function(metaStr) {
    try {
        const meta = JSON.parse(decodeURIComponent(metaStr));
        window._currentFbError = meta;
        
        document.getElementById('fb-rec-printer').innerText = meta.printer_name;
        document.getElementById('fb-rec-file').innerText = meta.filename;
        
        const spoolsContainer = document.getElementById('fb-rec-spools-container');
        spoolsContainer.innerHTML = '<div class="text-center text-info">Loading active spools from Command Center...</div>';
        
        if (!modals.fbRecoveryModal) {
            const el = document.getElementById('fbRecoveryModal');
            if (el) modals.fbRecoveryModal = new bootstrap.Modal(el);
        }
        modals.fbRecoveryModal.show();
        state.activeModal = 'fbRecoveryModal';
        
        // Fetch active spools
        fetch(`/api/fb_recovery_spools?printer_name=${encodeURIComponent(meta.printer_name)}`)
            .then(res => res.json())
            .then(data => {
                if (!data.success) {
                    spoolsContainer.innerHTML = `<div class="text-danger">Failed to load spools: ${data.msg}</div>`;
                    return;
                }
                
                if (data.spools.length === 0) {
                    spoolsContainer.innerHTML = `<div class="text-warning">No spools appear to be assigned to this printer in Command Center!</div>`;
                    return;
                }
                
                // Build input forms. Phase 2 (Group 12): each row has a
                // delta-style input (Additive mode in <WeightEntry> terms)
                // that accepts +/- prefix syntax for consistency with bulk
                // weigh-out's Additive mode. A small hint row under the
                // input previews the resulting used_weight once spool
                // details have been lazy-fetched.
                let html = '<div class="text-white-50 small mb-2">' +
                    'Mode: <span class="badge bg-info-subtle text-info-emphasis">Additive (delta consumed)</span> ' +
                    '<span class="ms-2">used = current_used + delta</span>' +
                    '</div>';
                html += '<div class="list-group list-group-flush bg-dark">';
                data.spools.forEach(s => {
                    let hex = s.color || "555";
                    let displayName = s.display || `<strong>#${s.id}</strong> Unknown Spool`;

                    html += `
                    <div class="list-group-item bg-dark text-light border-secondary fb-spool-row" data-sid="${s.id}">
                        <div class="d-flex justify-content-between align-items-center">
                            <div>
                                <span style="display:inline-block;width:15px;height:15px;background-color:#${hex};border-radius:50%;margin-right:8px;border:1px solid #fff;vertical-align:middle;"></span>
                                ${displayName}
                            </div>
                            <div class="input-group input-group-sm" style="width: 170px;">
                                <input type="text" class="form-control bg-secondary text-light border-dark fb-spool-input"
                                    placeholder="+ delta consumed" data-sid="${s.id}"
                                    oninput="window.fbUpdateRowPreview(this)">
                                <span class="input-group-text bg-dark text-light border-secondary">g</span>
                            </div>
                        </div>
                        <div class="text-info small mt-1 fb-spool-preview" data-sid="${s.id}" style="min-height:1em;"></div>
                    </div>`;
                });
                html += '</div>';
                spoolsContainer.innerHTML = html;
                if (typeof window.fbPrefetchAllRowDetails === 'function') {
                    window.fbPrefetchAllRowDetails();
                }
            })
            .catch(err => {
                spoolsContainer.innerHTML = `<div class="text-danger">Error loading spools.</div>`;
            });
            
    } catch (e) {
        console.error("Error parsing FilaBridge error meta:", e);
    }
};

window.triggerAggressiveGcodeParse = function() {
    if (!window._currentFbError) return;
    
    setProcessing(true);
    const btn = document.getElementById('btn-fb-auto-parse');
    const ogHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Fetching...`;
    
    // Fallback status poller to give UI feedback during the backend process
    let pollInterval = setInterval(() => {
        fetch('/api/fb_parse_status')
            .then(r => r.json())
            .then(st => {
                if(st && st.msg) {
                    const safeMsg = st.msg.replace('<', '&lt;').replace('>', '&gt;');
                    btn.innerHTML = `<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> ${safeMsg}`;
                }
            })
            .catch(e => {});
    }, 1500);

    fetch('/api/fb_aggressive_parse', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            printer_name: window._currentFbError.printer_name,
            filename: window._currentFbError.filename,
            error_id: window._currentFbError.error_id
        })
    })
    .then(r => r.json())
    .then(d => {
        clearInterval(pollInterval);
        btn.disabled = false;
        btn.innerHTML = ogHtml;
        setProcessing(false);
        if (d.success) {
            showToast(d.msg, 'success');
            closeModal('fbRecoveryModal');
        } else {
            alert("Auto-Parse Failed: " + d.msg + "\n\nPlease enter the weights manually or upload a local copy of the file.");
        }
    })
    .catch(err => {
        clearInterval(pollInterval);
        btn.disabled = false;
        btn.innerHTML = ogHtml;
        setProcessing(false);
        alert("Error during auto-parse: " + err);
    });
};

window.handleManualGcodeUpload = function(e) {
    const file = e.target.files[0];
    if (!file) return;
    
    const reader = new FileReader();
    reader.onload = function(evt) {
        const text = evt.target.result;
        const match = text.match(/;?\s*filament used \[g\]\s*=\s*([0-9.,\s]+)/);
        if (match) {
            const weightsStr = match[1];
            const weights = weightsStr.split(',').map(w => w.trim());
            const container = document.getElementById('fb-rec-spools-container');
            const inputs = container.querySelectorAll('.fb-spool-input');
            let matched = 0;
            inputs.forEach((input, index) => {
                if (index < weights.length) {
                    const w = parseFloat(weights[index]);
                    if (w > 0) {
                        input.value = w;
                        matched++;
                    }
                }
            });
            showToast(`Auto-filled weights from local file. Found ${matched} spools.`, 'success');
        } else {
            alert("Could not find 'filament used [g]' metadata in this file. It might not have been parsed by PrusaSlicer.");
        }
        e.target.value = ''; // Reset input
    };
    reader.readAsText(file);
};

// Phase 2 (Group 12): FilaBridge recovery uses the unified Additive math.
// Per-spool details are lazy-fetched on modal render so the per-row preview
// can show the resulting used_weight before the user submits.
window._fbDetailsCache = window._fbDetailsCache || new Map();

window.fbPrefetchAllRowDetails = function () {
    const rows = document.querySelectorAll('.fb-spool-row');
    rows.forEach(r => {
        const sid = Number(r.getAttribute('data-sid'));
        if (!sid || window._fbDetailsCache.has(sid)) return;
        fetch(`/api/spool_details?id=${sid}`)
            .then(r => r.json())
            .then(d => {
                if (!d || !d.id) return;
                window._fbDetailsCache.set(d.id, {
                    initial: Number(d.initial_weight) || Number(d.filament?.weight) || 0,
                    used: Number(d.used_weight) || 0,
                });
                const inp = document.querySelector(`.fb-spool-input[data-sid="${d.id}"]`);
                if (inp) window.fbUpdateRowPreview(inp);
            })
            .catch(() => {});
    });
};

window.fbUpdateRowPreview = function (inputEl) {
    if (!inputEl) return;
    const sid = Number(inputEl.getAttribute('data-sid'));
    const previewEl = document.querySelector(`.fb-spool-preview[data-sid="${sid}"]`);
    if (!previewEl) return;
    const raw = inputEl.value;
    if (raw === '' || raw === '+' || raw === '-') {
        previewEl.innerText = '';
        return;
    }
    const details = window._fbDetailsCache.get(sid);
    if (!details) { previewEl.innerText = '…'; return; }
    if (typeof window.parseAdditiveInput !== 'function' ||
        typeof window.computeUsedWeight !== 'function') {
        previewEl.innerText = '';
        return;
    }
    const parsed = window.parseAdditiveInput(raw);
    if (parsed.value === null || Number.isNaN(parsed.value)) {
        previewEl.innerHTML = '<span style="color:#f88;">Invalid input</span>';
        return;
    }
    const r = window.computeUsedWeight({
        mode: 'additive',
        value: parsed.value,
        initial_weight: details.initial,
        current_used: details.used,
    });
    if (r.error) {
        previewEl.innerHTML = '<span style="color:#f88;">Invalid input</span>';
        return;
    }
    let cap = '';
    if (r.capped === 'high') cap = ' <span style="color:#f5b342;">(capped)</span>';
    else if (r.capped === 'low') cap = ' <span style="color:#f5b342;">(clamped to 0)</span>';
    previewEl.innerHTML = `→ used <strong>${Math.round(r.used_weight)}g</strong> · remaining <strong>${Math.round(r.remaining)}g</strong>${cap}`;
};

window.submitManualFilaBridgeRecovery = function() {
    if (!window._currentFbError) return;

    const container = document.getElementById('fb-rec-spools-container');
    const rows = container.querySelectorAll('.fb-spool-row');

    let updates = {};
    let hasUpdates = false;

    rows.forEach(r => {
        const sid = r.getAttribute('data-sid');
        const input = r.querySelector('.fb-spool-input');
        if (input && input.value) {
            // Parse the +/- delta syntax — bare numbers (e.g. "25") still
            // submit as positive deltas, matching the legacy behavior.
            const parsed = (typeof window.parseAdditiveInput === 'function')
                ? window.parseAdditiveInput(input.value)
                : { value: parseFloat(input.value) };
            const val = parsed.value;
            if (val !== null && !Number.isNaN(val) && val > 0) {
                updates[sid] = val;
                hasUpdates = true;
            }
        }
    });
    
    // Allow empty submission to just "acknowledge" the error if no filament was used?
    // Let's ask for confirmation if no updates are found.
    if (!hasUpdates) {
        if (!confirm("You haven't entered any weight used. Are you sure you just want to dismiss this error?")) {
            return;
        }
    }
    
    setProcessing(true);
    fetch('/api/fb_manual_recovery', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
            error_id: window._currentFbError.error_id,
            updates: updates
        })
    })
    .then(r => r.json())
    .then(d => {
        setProcessing(false);
        if (d.success) {
            showToast("Error explicitly resolved.", 'success');
            closeModal('fbRecoveryModal');
        } else {
            showToast(d.msg, 'error');
        }
    });
};
</script>
