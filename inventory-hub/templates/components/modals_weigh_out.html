<!-- modals_weigh_out.html -->
<div class="modal fade" id="weighOutModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content bg-dark border border-success border-2 shadow-lg">
            <div class="modal-header border-bottom border-success border-opacity-50 text-white">
                <h5 class="modal-title d-flex align-items-center gap-2">
                    ⚖️ Bulk Weigh-Out
                </h5>
                <span class="badge bg-secondary ms-3" id="weigh-out-count">0 Spools Ready</span>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-white" style="background-color: #1a1e23; max-height: 70vh; overflow-y: auto;">
                <!-- Phase 2 (Group 12): modal-level mode selector. The same value
                     applies to every row — most users batch-weigh the same way.
                     Default is Net to preserve historical behavior (input is the
                     spool's remaining filament weight). Switching to Gross gives
                     L38 (auto-subtract spool tare). -->
                <div class="d-flex align-items-center gap-2 mb-3 pb-2 border-bottom border-secondary">
                    <span class="text-white-50 small">Mode</span>
                    <div class="btn-group btn-group-sm" role="group" id="weigh-out-mode">
                        <button type="button" class="btn btn-outline-info" data-mode="gross">Gross</button>
                        <button type="button" class="btn btn-info" data-mode="net">Net</button>
                        <button type="button" class="btn btn-outline-info" data-mode="additive">Additive</button>
                        <button type="button" class="btn btn-outline-info" data-mode="set_used">Set Used</button>
                    </div>
                    <span class="text-white-50 small ms-2" id="weigh-out-mode-hint">used = initial − net</span>
                </div>

                <div id="weigh-out-empty" class="text-center text-white-50 p-4">
                    <h5>No Spools in Buffer</h5>
                    <p>Scan some spools into the buffer first, or scan them now while this window is open!</p>
                </div>

                <div id="weigh-out-list" class="d-flex flex-column gap-3">
                    <!-- Spool rows will be injected here -->
                </div>
            </div>
            <div class="modal-footer border-top border-success border-opacity-50 d-flex justify-content-between flex-wrap">
                <div class="text-white-50 small">Scan new items to add to this list. Type weight and press Enter to save.</div>
                <div class="d-flex align-items-center gap-3">
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="weigh-auto-archive" checked>
                        <label class="form-check-label text-warning small" for="weigh-auto-archive">Auto-Archive 0g</label>
                    </div>
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Native Quick Weigh Modal -->
<div class="modal fade" id="quickWeighModal" tabindex="-1" aria-hidden="true" style="z-index: 1060;">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark border border-secondary shadow-lg">
            <div class="modal-header border-bottom border-secondary text-white">
                <h5 class="modal-title">⚖️ Quick Weigh</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-white">
                <div class="text-info fw-bold mb-2" id="qw-title">ID: --</div>
                <div class="d-flex justify-content-between mb-3 border-bottom pb-2 border-secondary">
                    <div class="text-light small">Initial: <span id="qw-meta-initial">--</span></div>
                    <div class="text-light small">Empty: <span id="qw-meta-empty">--</span></div>
                </div>
                
                <input type="hidden" id="qw-spool-id">
                <input type="hidden" id="qw-meta-initial-val">

                <label class="form-label text-light small mb-1">New Total Remaining Weight (g)</label>
                <input type="number" id="qw-remaining" class="form-control bg-dark text-white border-secondary mb-3 mt-0 mx-0 w-100" style="height: auto; font-size: 1.25rem;">
                
                <label class="form-label text-warning small mb-1">Adjustment Amount (g) - e.g. 25, -25, or +50</label>
                <input type="text" id="qw-deduct" class="form-control bg-dark text-white border-warning mb-3 mt-0 mx-0 w-100" style="height: auto; font-size: 1.25rem;" placeholder="e.g. +25 or 25">
                
                <div class="form-check form-switch mt-3 pt-2 border-top border-secondary">
                    <input class="form-check-input" type="checkbox" id="qw-auto-archive" checked>
                    <label class="form-check-label text-light" for="qw-auto-archive">Auto Archive & Eject if Empty (0g)</label>
                </div>
            </div>
            <div class="modal-footer border-top border-secondary d-flex justify-content-between">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-success fw-bold" id="qw-btn-save" onclick="window.saveQuickWeigh()">Save Update</button>
            </div>
        </div>
    </div>
</div>
