<!-- Global Location View QR Modal -->
<div class="modal fade" id="locQrViewModal" tabindex="-1">
    <div class="modal-dialog modal-sm modal-dialog-centered">
        <div class="modal-content border-info rounded-3">
            <div class="modal-header bg-dark border-bottom border-info">
                <h5 class="modal-title text-info fw-bold" id="locQrViewTitle">Location QR Code</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center bg-dark text-white p-4">
                <div id="loc-qr-view-container" class="bg-white p-3 rounded d-inline-block shadow-lg mx-auto mb-3"></div>
                <div id="loc-qr-view-label" class="fs-4 fw-bold mt-2 text-pop">LOC:...</div>
                 <div class="small text-muted mt-2">Scan via Command Center or external devices</div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="locMgrModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-scrollable modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">📍 Location List</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body p-0">
                <div class="d-flex justify-content-between align-items-center p-3 border-bottom bg-dark">
                    <span id="loc-count" class="text-info fw-bold fcc-loc-count">Loading...</span>
                    <button class="btn btn-success" onclick="openAddModal()">➕ Add Location</button>
                </div>
                <div class="table-responsive max-h-70vh">
                    <table class="table table-dark table-hover mb-0">
                        <thead class="sticky-th">
                            <tr>
                                <th style="width:15%; cursor:pointer;" onclick="sortLocations('LocationID')">ID ↕️</th>
                                <th style="width:35%; cursor:pointer;" onclick="sortLocations('Name')">Name ↕️</th>
                                <th style="width:15%; cursor:pointer;" onclick="sortLocations('Type')">Type ↕️</th>
                                <th style="width:10%; cursor:pointer;" onclick="sortLocations('Occupancy')">Status ↕️</th>
                                <th class="text-end" style="width:25%">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="location-table"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="locModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Edit Location</h5>
                <button type="button" class="btn-close btn-close-white" onclick="closeEdit()"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="edit-original-id">
                <div class="mb-3">
                    <label class="form-label">Location ID (e.g., BOX-1)</label>
                    <input type="text" class="form-control" id="edit-id">
                </div>
                <div class="mb-3">
                    <label class="form-label">Friendly Name</label>
                    <input type="text" class="form-control" id="edit-name">
                </div>
                <div class="mb-3">
                    <label class="form-label">Type</label>
                    <select class="form-select" id="edit-type">
                        <option value="Storage">Storage Box</option>
                        <option value="Dryer Box">Dryer Box</option>
                        <option value="Shelf">Shelf</option>
                        <option value="Cart">Cart</option>
                        <option value="MMU Slot">MMU Slot</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label class="form-label">Max Spools (Capacity)</label>
                    <input type="number" class="form-control" id="edit-max" value="1">
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" onclick="closeEdit()">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="saveLocation()">💾 Save Changes</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="manageModal" tabindex="-1">
    <div class="modal-dialog modal-xl modal-dialog-centered modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header p-2 d-flex align-items-center">
                <h5 class="modal-title ms-3 text-info flex-grow-1" id="manageTitle">Manage</h5>
                <div id="manage-loc-qr-wrap" class="bg-white rounded me-3 cursor-pointer shadow-sm" style="width: 58px; height: 58px; display:flex; justify-content:center; align-items:center; padding: 6px;" onclick="showGlobalQrModal(document.getElementById('manage-loc-id').value)" title="Enlarge Location QR">
                     <div id="manage-loc-qr-mini"></div>
                </div>
                <button class="btn btn-sm btn-outline-warning fw-bold me-2"
                    onclick="window.printCurrentLocationLabel()">🖨️ Print Location Label</button>
                <button type="button" class="btn-close btn-close-white me-2" onclick="closeManage()"></button>
            </div>

            <div class="modal-body">
                <input type="hidden" id="manage-loc-id">

                <div id="loc-mgr-nav-deck" class="mb-4"></div>

                <div id="manage-grid-view" class="container-fluid px-1" style="display:none;">
                    <div class="alert alert-info py-1 mb-3 small text-center fw-bold text-uppercase fcc-alert-scan">
                        Tap button or scan slot QR (CMD:SLOT:X)
                    </div>
                    <div id="slot-grid-container" class="slot-grid"></div>
                    <div id="unslotted-container" class="mt-4" style="display:none;"></div>
                </div>

                <div id="manage-list-view" class="container px-2" style="display:none;">
                    <div id="manage-empty-msg" class="empty-state-box text-center py-5">
                        <div class="empty-state-text fs-1 fw-bold">EMPTY</div>
                        <p class="mt-2">Scan a spool to add it here.</p>
                    </div>
                    <div id="manage-contents-list" class="mb-4"></div>
                </div>

                <hr class="border-secondary mt-4">

                <div class="input-group mb-3">
                    <input type="text" id="manual-spool-id"
                        class="form-control form-control-lg bg-dark text-white border-secondary"
                        placeholder="Enter Spool ID / Scan Legacy">
                    <button class="btn btn-primary btn-lg fw-bold" onclick="window.manualAddSpool()">➕ Add (To
                        Buffer)</button>
                </div>

                <div
                    class="d-flex justify-content-between align-items-center bg-dark p-2 rounded border border-secondary gap-3">
                    <button class="btn btn-success btn-lg flex-grow-1 fw-bold" onclick="closeManage()">✅ Done /
                        Sync</button>

                    <div id="qr-footer-block" class="cursor-pointer" onclick="closeManage()">
                        <div id="qr-modal-done"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
